name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Core package: lint / type / test(cover) / build / twine, across OS + Python
  # ---------------------------------------------------------------------------
  test:
    name: "core ${{ matrix.os }} py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (strict type check)
        run: mypy

      - name: Pytest (with coverage gate)
        run: pytest -q

      - name: Build (wheel + sdist)
        run: python -m build

      - name: Twine check (release metadata)
        run: twine check dist/*

  # ---------------------------------------------------------------------------
  # Signer extension (depends on core): same OS x Python matrix
  # ---------------------------------------------------------------------------
  signer:
    name: "signer ${{ matrix.os }} py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core + signer dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e "./extensions/provenance_gate_signer[dev]"

      - name: Ruff (signer)
        run: ruff check extensions/provenance_gate_signer

      # Run mypy from the extension dir so its own pyproject [tool.mypy]
      # (exclude = "tests") applies. Running `mypy extensions/...` from the
      # repo root uses the ROOT config (no test exclude) and strict-checks the
      # unannotated test files -> 35 spurious errors. `cd` + `.` is the fix.
      - name: Mypy (signer, strict)
        working-directory: extensions/provenance_gate_signer
        run: mypy .

      - name: Pytest (signer, with coverage gate)
        run: pytest -q extensions/provenance_gate_signer/provenance_gate_signer/tests

  # ---------------------------------------------------------------------------
  # Property-based fuzzing (Hypothesis) — Linux only, dedicated job so a fuzz
  # regression is reported distinctly from the unit matrix.
  # ---------------------------------------------------------------------------
  fuzz:
    name: "fuzz py3.12"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e "./extensions/provenance_gate_signer[dev]"
          pip install hypothesis
      - name: Fuzz signer crypto invariants
        # -o addopts="" clears the package pyproject [tool.pytest.ini_options]
        # addopts (which force --cov/--cov-fail-under). Without it, the signer
        # extension's own addopts re-inject a coverage gate that the fuzz run
        # cannot satisfy (it only exercises crypto paths, not full coverage).
        # --no-cov is kept as a belt-and-suspenders guard.
        run: >-
          pytest -q -o addopts="" --no-cov
          extensions/provenance_gate_signer/provenance_gate_signer/tests/test_fuzz.py
          --hypothesis-seed=1

  # ---------------------------------------------------------------------------
  # SAST — Bandit (Python) + Semgrep (custom invariant rules)
  # ---------------------------------------------------------------------------
  sast:
    name: "sast"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -c bandit.yaml -r src extensions -x '*/tests/*,*/build/*'
      - name: Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: semgrep.yml
