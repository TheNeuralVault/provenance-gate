name: CI

# Least-privilege token by default. Jobs widen only where strictly needed.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Core package: lint / type / test(cover) / build / twine, across OS + Python
  # ---------------------------------------------------------------------------
  test:
    name: "core ${{ matrix.os }} py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      # Pinned to full commit SHA (supply-chain integrity). Update via
      # `gh api repos/actions/checkout/commits?sha=v4` when bumping.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build twine

      - name: Ruff (lint)
        run: ruff check src tests

      - name: Mypy (strict type check)
        run: mypy

      - name: Pytest (with coverage gate)
        run: pytest -q

      - name: Build (wheel + sdist)
        run: python -m build

      # T1 build verification: install the freshly built wheel into a CLEAN
      # venv and import-smoke it. twine check only validates metadata — it
      # does NOT prove the artifact installs or imports. This does.
      - name: Verify build (clean install + import smoke)
        run: |
          python -m venv .venv-verify
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python -c "import provenance_gate; print('import ok', provenance_gate.__name__)"

      - name: Twine check (release metadata)
        run: twine check dist/*

  # ---------------------------------------------------------------------------
  # Signer extension (depends on core): same OS x Python matrix
  # ---------------------------------------------------------------------------
  signer:
    name: "signer ${{ matrix.os }} py${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # POSIX-only: the signer's security boundary is an AF_UNIX socket, which
        # CPython does not expose on Windows (cpython #77589 open; typeshed
        # excludes AF_UNIX on win32). Core still covers Windows separately.
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: extensions/provenance_gate_signer/pyproject.toml

      - name: Install core + signer dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e "./extensions/provenance_gate_signer[dev]"

      - name: Ruff (signer)
        run: ruff check extensions/provenance_gate_signer

      # Run mypy from the extension dir so its own pyproject [tool.mypy]
      # (exclude = "tests") applies. Running `mypy extensions/...` from the
      # repo root uses the ROOT config (no test exclude) and strict-checks the
      # unannotated test files -> 35 spurious errors. `cd` + `.` is the fix.
      - name: Mypy (signer, strict)
        working-directory: extensions/provenance_gate_signer
        run: mypy .

      - name: Pytest (signer, with coverage gate)
        run: pytest -q extensions/provenance_gate_signer/provenance_gate_signer/tests

  # ---------------------------------------------------------------------------
  # Property-based fuzzing (Hypothesis) — Linux only, dedicated job so a fuzz
  # regression is reported distinctly from the unit matrix.
  # ---------------------------------------------------------------------------
  fuzz:
    name: "fuzz py3.12"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: extensions/provenance_gate_signer/pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -e "./extensions/provenance_gate_signer[dev]"
          pip install hypothesis
      - name: Fuzz signer crypto invariants
        # -o addopts="" clears the package pyproject [tool.pytest.ini_options]
        # addopts (which force --cov/--cov-fail-under). Without it, the signer
        # extension's own addopts re-inject a coverage gate that the fuzz run
        # cannot satisfy (it only exercises crypto paths, not full coverage).
        # --no-cov is kept as a belt-and-suspenders guard.
        run: >-
          pytest -q -o addopts="" --no-cov
          extensions/provenance_gate_signer/provenance_gate_signer/tests/test_fuzz.py
          --hypothesis-seed=1

  # ---------------------------------------------------------------------------
  # SAST — Bandit (Python) + Semgrep (custom invariant rules)
  # ---------------------------------------------------------------------------
  sast:
    name: "sast"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit
          bandit -c bandit.yaml -r src extensions -x '*/tests/*,*/build/*'
      - name: Semgrep
        # Pinned to full commit SHA (supply-chain integrity). The action's
        # repo moved returntocorp/semgrep-action -> semgrep/semgrep-action; the
        # GH Actions SHA resolver follows the *tag* redirect but NOT a raw-SHA
        # redirect, so the SHA must be pinned under the CURRENT owner.
        uses: semgrep/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d
        with:
          config: semgrep.yml
